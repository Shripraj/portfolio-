{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<section class="error-page">
  <div class="error-glow"></div>
  <div class="error-content" data-aos="zoom-in">
    <h1 class="error-code gradient-text">404</h1>
    <p class="error-msg">This route doesn't exist — like calling a function that was never defined.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
  </div>
</section>
{% endblock %}
