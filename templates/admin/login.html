{% extends "admin/base.html" %}
{% block title %}Login{% endblock %}
{% block content_out %}
<div class="admin-auth">
  <div class="admin-auth-card glass">
    <div class="admin-auth-icon"><i class="fa-solid fa-shield-halved"></i></div>
    <h1>Admin Login</h1>
    <p class="admin-auth-sub">Sign in to manage the portfolio content.</p>
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus placeholder="admin">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>
    <a href="{{ url_for('index') }}" class="admin-back-link"><i class="fa-solid fa-arrow-left"></i> Back to site</a>
  </div>
</div>
{% endblock %}
