{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<section class="error-page">
  <div class="error-glow"></div>
  <div class="error-content" data-aos="zoom-in">
    <h1 class="error-code gradient-text">500</h1>
    <p class="error-msg">Something broke on the server side. It's not you, it's my code.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
  </div>
</section>
{% endblock %}
